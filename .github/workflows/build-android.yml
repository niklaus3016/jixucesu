name: Build Android APK

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build web assets
        run: npm run build
      
      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      
      - name: Install Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Sync Capacitor
        run: npx cap sync android

      - name: Fix gradle wrapper completely
        run: |
          cd android
          # 删除现有的gradle wrapper目录
          rm -rf gradle/wrapper
          # 重新创建目录
          mkdir -p gradle/wrapper
          # 下载正确的gradle-wrapper.jar
          curl -L -o gradle/wrapper/gradle-wrapper.jar https://services.gradle.org/distributions/gradle-8.7-wrapper.jar
          # 下载正确的gradlew脚本
          curl -L -o gradlew https://raw.githubusercontent.com/gradle/gradle/v8.7.0/gradlew
          # 生成正确的gradle-wrapper.properties
          echo "distributionBase=GRADLE_USER_HOME" > gradle/wrapper/gradle-wrapper.properties
          echo "distributionPath=wrapper/dists" >> gradle/wrapper/gradle-wrapper.properties
          echo "zipStoreBase=GRADLE_USER_HOME" >> gradle/wrapper/gradle-wrapper.properties
          echo "zipStorePath=wrapper/dists" >> gradle/wrapper/gradle-wrapper.properties
          echo "distributionUrl=https\://services.gradle.org/distributions/gradle-8.7-bin.zip" >> gradle/wrapper/gradle-wrapper.properties
          # 赋予执行权限
          chmod +x gradlew

      - name: Generate signing key
        run: |
          cd android/app
          keytool -genkey -v -keystore release.keystore -alias jxcs -keyalg RSA -keysize 2048 -validity 10000 -storepass jxcs123456 -keypass jxcs123456 -dname "CN=极序测速, OU=极序技术团队, O=光年跃迁科技, L=温州, ST=浙江, C=CN"
      
      - name: Build Debug APK
        run: |
          cd android
          gradle assembleDebug
      
      - name: Build Release APK
        run: |
          cd android
          gradle assembleRelease
      
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
      
      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: android/app/build/outputs/apk/release/app-release.apk