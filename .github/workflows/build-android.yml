name: Build Android APK

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Build web app
      run: npm run build
    
    - name: Sync web resources to Android
      run: npx cap sync android
    
    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'adopt'
        java-version: '21'
    
    - name: Set up Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Fix gradle wrapper
      run: |
        cd android
        rm -rf gradle/wrapper/gradle-wrapper.jar
        curl -L -o gradle/wrapper/gradle-wrapper.jar https://services.gradle.org/distributions/gradle-8.7-wrapper.jar
        chmod +x gradlew

    - name: Create keystore file from GitHub Secrets
      run: |
        cd android
        if [ -z "${{ secrets.KEYSTORE_BASE64 }}" ]; then
          echo "Error: KEYSTORE_BASE64 secret is not set"
          exit 1
        fi
        if [ -f "my-release-key.keystore" ]; then
          rm -f my-release-key.keystore
        fi
        echo "Creating keystore file from GitHub Secrets"
        echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > my-release-key.keystore
        echo "=== Listing aliases in keystore ==="
        keytool -list -keystore my-release-key.keystore -storepass "${{ secrets.KEYSTORE_PASSWORD }}"

    - name: Build Android Release APK
      run: |
        cd android
        echo "=== Building Release APK ==="
        ./gradlew clean
        ./gradlew assembleRelease --no-build-cache --no-daemon -Pandroid.injected.signing.store.file=my-release-key.keystore -Pandroid.injected.signing.store.password="${{ secrets.KEYSTORE_PASSWORD }}" -Pandroid.injected.signing.key.alias=jixucesu -Pandroid.injected.signing.key.password="${{ secrets.KEYSTORE_PASSWORD }}"
        ls -la app/build/outputs/apk/release/

    - name: Build Android Debug APK
      run: |
        cd android
        ./gradlew assembleDebug
    
    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: android/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30
    
    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: app-release
        path: android/app/build/outputs/apk/release/app-release.apk
        retention-days: 30
